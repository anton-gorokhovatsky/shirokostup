<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Olga Shirokostup</title>
  <desc id="desc">Independent curator, researcher, and educator working across the European High North</desc>
  <defs>
    <pattern id="paper-dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#f3f0e8" opacity="0.075"/>
    </pattern>
    <radialGradient id="aurora" gradientUnits="userSpaceOnUse" cx="8" cy="12" r="42">
      <stop offset="0" stop-color="#c9e876" stop-opacity="0.9"/>
      <stop offset="0.22" stop-color="#c9e876" stop-opacity="0.68"/>
      <stop offset="0.56" stop-color="#c9b2d6" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#c9b2d6" stop-opacity="0"/>
    </radialGradient>
    <filter id="aurora-blur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#11130f"/>
  <rect width="1200" height="630" fill="url(#paper-dots)"/>

  <text x="64" y="98" fill="#f3f0e8" font-family="Arial, Helvetica, sans-serif" font-size="15" letter-spacing="2.35">INDEPENDENT CURATOR · RESEARCHER · EDUCATOR</text>

  <text x="59" y="305" fill="#f3f0e8" font-family="Iowan Old Style, Palatino Linotype, Book Antiqua, Palatino, Georgia, serif" font-size="148" letter-spacing="-7.5">Olga</text>
  <text x="152" y="467" fill="#f3f0e8" font-family="Iowan Old Style, Palatino Linotype, Book Antiqua, Palatino, Georgia, serif" font-size="140" letter-spacing="-7.5">Shirokostup</text>

  <g transform="translate(820 78) scale(6.2)">
    <g
      fill="none"
      stroke="url(#aurora)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="4.2"
      opacity="0.38"
      filter="url(#aurora-blur)"
    >
      <path d="M4 24C10 8 31 4 43 16"/>
      <path d="M6 31c9-16 28-18 38-7"/>
      <path d="M11 38c8-12 24-15 32-6"/>
      <circle cx="8" cy="12" r="3.5" fill="url(#aurora)" stroke="none"/>
    </g>
    <g fill="none" stroke="#f3f0e8" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <path d="M4 24C10 8 31 4 43 16"/>
      <path d="M6 31c9-16 28-18 38-7"/>
      <path d="M11 38c8-12 24-15 32-6"/>
      <circle cx="8" cy="12" r="3.5" fill="#f3f0e8" stroke="none"/>
    </g>
  </g>

  <line x1="64" y1="545" x2="1136" y2="545" stroke="#f3f0e8" opacity="0.24"/>
  <text x="64" y="585" fill="#f3f0e8" font-family="Arial, Helvetica, sans-serif" font-size="17">Artistic research · archives · exhibition-making</text>
  <text x="1136" y="585" fill="#f3f0e8" font-family="Arial, Helvetica, sans-serif" font-size="17" text-anchor="end">Lyon · European High North</text>
</svg>
