<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" role="img" aria-labelledby="title desc">
  <title id="title">Olga Shirokostup</title>
  <desc id="desc">Three curved lines and one focus point</desc>
  <defs>
    <pattern id="paper-dots" width="7" height="7" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.7" fill="#11130f" opacity="0.055"/>
    </pattern>
    <radialGradient id="aurora" gradientUnits="userSpaceOnUse" cx="8" cy="12" r="42">
      <stop offset="0" stop-color="#c9e876" stop-opacity="0.92"/>
      <stop offset="0.24" stop-color="#c9e876" stop-opacity="0.7"/>
      <stop offset="0.62" stop-color="#c9b2d6" stop-opacity="0.46"/>
      <stop offset="1" stop-color="#c9b2d6" stop-opacity="0"/>
    </radialGradient>
    <filter id="aurora-blur" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="1.7"/>
    </filter>
  </defs>
  <rect width="180" height="180" rx="34" fill="#f2efe7"/>
  <rect width="180" height="180" rx="34" fill="url(#paper-dots)"/>
  <g transform="translate(20 22) scale(2.9)">
    <g
      fill="none"
      stroke="url(#aurora)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="4.2"
      opacity="0.42"
      filter="url(#aurora-blur)"
    >
      <path d="M4 24C10 8 31 4 43 16"/>
      <path d="M6 31c9-16 28-18 38-7"/>
      <path d="M11 38c8-12 24-15 32-6"/>
      <circle cx="8" cy="12" r="3.5" fill="url(#aurora)" stroke="none"/>
    </g>
    <g fill="none" stroke="#11130f" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2">
      <path d="M4 24C10 8 31 4 43 16"/>
      <path d="M6 31c9-16 28-18 38-7"/>
      <path d="M11 38c8-12 24-15 32-6"/>
      <circle cx="8" cy="12" r="3.5" fill="#11130f" stroke="none"/>
    </g>
  </g>
</svg>
