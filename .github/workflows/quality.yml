name: Quality gate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  structure-and-accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run site quality checks
        run: npm run check
